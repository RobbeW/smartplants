<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Arduino schema voor Project Smart Plants</title>
  <desc id="desc">Arduino met bodemvochtsensor: VCC naar 5V of 3V3 volgens sensor, GND naar GND, analoge uitgang naar A0 en USB naar laptop.</desc>
  <defs>
    <style>
      .bg{fill:#f8f7f3}
      .panel{fill:#fff;stroke:#d8cfee;stroke-width:3}
      .board{fill:#123f6d;stroke:#062645;stroke-width:4}
      .sensor{fill:#2b2f38;stroke:#12151d;stroke-width:4}
      .pin{fill:#f5c64b;stroke:#7f6120;stroke-width:2}
      .wire5{fill:none;stroke:#d0006f;stroke-width:9;stroke-linecap:round}
      .wireg{fill:none;stroke:#1f2937;stroke-width:9;stroke-linecap:round}
      .wirea{fill:none;stroke:#ffb000;stroke-width:9;stroke-linecap:round}
      .usb{fill:none;stroke:#5200ff;stroke-width:8;stroke-linecap:round;stroke-dasharray:20 14}
      .label{font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;font-size:30px;font-weight:800;fill:#160033}
      .small{font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;font-size:22px;font-weight:700;fill:#42384f}
      .tag{font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;font-size:23px;font-weight:900;fill:#fff}
      .note{font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;font-size:24px;font-weight:750;fill:#5200ff}
      .chip{fill:#5200ff}
      .soil{fill:#5b3a25}
      .plant{fill:none;stroke:#16a34a;stroke-width:10;stroke-linecap:round}
      .leaf{fill:#4ade80;stroke:#16a34a;stroke-width:3}
    </style>
  </defs>
  <rect class="bg" width="1200" height="820"/>
  <rect class="panel" x="34" y="34" width="1132" height="752" rx="28"/>

  <text class="label" x="72" y="88">Arduino eerst: bodemvochtigheid meten</text>
  <text class="small" x="72" y="126">De browser kalibreert droog, vochtig en nat. De firmware stuurt ruwe waarden via USB.</text>

  <rect x="86" y="190" width="410" height="350" rx="24" class="board"/>
  <text class="tag" x="116" y="235">ARDUINO</text>
  <rect x="176" y="274" width="145" height="90" rx="12" class="chip"/>
  <circle class="pin" cx="450" cy="260" r="17"/><text class="small" x="380" y="230">5V/3V3</text>
  <circle class="pin" cx="450" cy="340" r="17"/><text class="small" x="390" y="314">GND</text>
  <circle class="pin" cx="450" cy="420" r="17"/><text class="small" x="405" y="394">A0</text>
  <rect x="92" y="430" width="96" height="58" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="3"/>
  <text class="small" x="112" y="467">USB</text>

  <rect x="754" y="194" width="270" height="310" rx="26" class="sensor"/>
  <text class="tag" x="782" y="240">BODEM-</text>
  <text class="tag" x="782" y="278">SENSOR</text>
  <rect x="794" y="318" width="70" height="150" rx="16" fill="#6b7280"/>
  <rect x="914" y="318" width="70" height="150" rx="16" fill="#6b7280"/>
  <circle class="pin" cx="766" cy="560" r="17"/><text class="small" x="734" y="612">VCC</text>
  <circle class="pin" cx="890" cy="560" r="17"/><text class="small" x="864" y="612">GND</text>
  <circle class="pin" cx="1014" cy="560" r="17"/><text class="small" x="998" y="612">AO</text>

  <rect x="758" y="650" width="276" height="78" rx="18" class="soil"/>
  <path class="plant" d="M896 650 C890 588 910 548 934 504"/>
  <ellipse class="leaf" cx="944" cy="508" rx="44" ry="22" transform="rotate(-25 944 508)"/>
  <ellipse class="leaf" cx="884" cy="530" rx="38" ry="20" transform="rotate(28 884 530)"/>

  <path class="wire5" d="M450 260 C590 226 640 226 766 560"/>
  <path class="wireg" d="M450 340 C610 358 672 430 890 560"/>
  <path class="wirea" d="M450 420 C580 500 724 520 1014 560"/>
  <path class="usb" d="M136 430 C138 150 342 124 598 154 C822 180 926 122 1064 106"/>
  <rect x="1000" y="82" width="124" height="70" rx="12" fill="#e0f2fe" stroke="#38bdf8" stroke-width="3"/>
  <text class="small" x="1022" y="126">Laptop</text>

  <rect x="72" y="608" width="570" height="98" rx="18" fill="#f7f3ff" stroke="#d8cfee" stroke-width="3"/>
  <text class="note" x="104" y="649">Serieel: 9600 baud</text>
  <text class="small" x="104" y="684">Regel: tijd_ms,raw of tijd_ms,raw,average,category_code</text>
</svg>
